<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Giriş Yap - MRZGR Helpdesk</title>
    <link rel="icon" href="https://img.icons8.com/color/48/rocket.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #2c3e50; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: none; }
        .btn-primary { background-color: #e67e22; border: none; }
        .btn-primary:hover { background-color: #d35400; }
    </style>
</head>
<body>

    <div class="card p-4">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-dark">🚀 MRZGR Helpdesk</h2>
            <p class="text-muted">Personel Giriş Ekranı</p>
        </div>

        <form method="post">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="alert alert-danger text-center p-2">
                    Kullanıcı adı veya şifre hatalı!
                </div>
            {% endif %}

            <div class="mb-3">
                <label class="form-label">Kullanıcı Adı</label>
                <input type="text" name="username" class="form-control" required autofocus>
            </div>

            <div class="mb-3">
                <label class="form-label">Şifre</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg">Giriş Yap</button>
            </div>
        </form>
        
        <div class="text-center mt-3">
            <small class="text-muted">Giriş yapamıyorsanız IT departmanına başvurun.</small>
        </div>
    </div>

</body>
</html>
